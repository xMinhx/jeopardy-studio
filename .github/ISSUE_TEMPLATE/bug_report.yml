name: Bug Report
description: Create a report to help us improve Jeopardy Studio.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us what you expected to happen.
      placeholder: Tell us what you did and what went wrong...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Jeopardy Studio Version
      description: Find this in package.json or the Help > About menu.
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows 10
        - Windows 11
        - macOS (Self-built)
        - Linux (Self-built)
    validations:
      required: true
  - type: textarea
    id: reproduction-steps
    attributes:
      label: Reproduction Steps
      description: How can we reproduce this bug?
      placeholder: |
        1. Open Host Control
        2. Click on...
        3. See error...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: Please copy and paste any relevant log output from the terminal or dev tools.
      render: shell
